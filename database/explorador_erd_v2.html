
<style>
h2.sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
*{box-sizing:border-box}
.wrap{padding:1rem 0;font-size:13px}
.top-bar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.top-bar input{flex:1;min-width:140px}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:3px 10px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);cursor:pointer;font-size:12px;transition:background .15s}
.chip.on{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:1rem}
.tcard{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;cursor:pointer;transition:border-color .15s}
.tcard:hover,.tcard.sel{border-color:var(--color-border-info)}
.tcard.sel{border-width:1.5px}
.tcard-head{padding:9px 12px 8px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:space-between;gap:6px}
.tcard-name{font-weight:500;font-size:13px;color:var(--color-text-primary)}
.tcard-desc{font-size:11px;color:var(--color-text-secondary);padding:4px 12px 6px}
.badge{font-size:11px;padding:1px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.tcard-cols{padding:4px 12px 8px;display:flex;flex-direction:column;gap:2px}
.col-row{display:flex;align-items:center;justify-content:space-between;padding:3px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.col-row:last-child{border-bottom:none}
.col-name{color:var(--color-text-primary);font-size:12px;display:flex;align-items:center;gap:3px}
.col-type{color:var(--color-text-tertiary);font-size:11px;font-family:var(--font-mono)}
.pk{color:#085041;font-size:10px;background:#E1F5EE;padding:1px 5px;border-radius:4px}
.fk{color:#0C447C;font-size:10px;background:#E6F1FB;padding:1px 5px;border-radius:4px}
.uk{color:#633806;font-size:10px;background:#FAEEDA;padding:1px 5px;border-radius:4px}
.detail-panel{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);overflow:hidden;margin-bottom:1rem}
.detail-head{padding:12px 16px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.detail-title{font-weight:500;font-size:15px;color:var(--color-text-primary);margin-bottom:2px}
.detail-desc{font-size:12px;color:var(--color-text-secondary)}
.detail-cols table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.detail-cols th{padding:7px 12px;text-align:left;font-weight:500;font-size:11px;color:var(--color-text-secondary);background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary)}
.detail-cols td{padding:6px 12px;border-bottom:0.5px solid var(--color-border-tertiary);vertical-align:top;word-break:break-word}
.detail-cols tr:last-child td{border-bottom:none}
.detail-cols tr:hover td{background:var(--color-background-secondary)}
.col-w1{width:18%}.col-w2{width:16%}.col-w3{width:20%}.col-w4{width:46%}
.rel-sec{padding:10px 16px;border-top:0.5px solid var(--color-border-tertiary)}
.rel-sec h4{font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:7px;text-transform:uppercase;letter-spacing:.04em}
.rels{display:flex;flex-wrap:wrap;gap:6px}
.rel-pill{padding:3px 10px;border-radius:20px;border:0.5px solid var(--color-border-tertiary);font-size:12px;cursor:pointer;color:var(--color-text-secondary);background:var(--color-background-secondary)}
.rel-pill:hover{border-color:var(--color-border-info);color:var(--color-text-info)}
.enum-sec{padding:8px 16px 10px;border-top:0.5px solid var(--color-border-tertiary)}
.enum-sec h4{font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.enum-pills{display:flex;gap:5px;flex-wrap:wrap}
.enum-pill{padding:2px 8px;border-radius:20px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);font-size:11px;color:var(--color-text-secondary);font-family:var(--font-mono)}
.no-res{padding:24px;text-align:center;color:var(--color-text-tertiary);font-size:13px}
.stat-bar{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 14px;display:flex;flex-direction:column;gap:2px}
.stat-n{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.stat-l{font-size:11px;color:var(--color-text-secondary)}
</style>

  estudiantes:["matriculas","configuracion_pins","piar","portafolios","observaciones","asistencias","ajustes_temporales"],
  modulos:["temas"],
  temas:["actividades","portafolios","observaciones","notas_docente"],
  matriculas:[],configuracion_pins:[],piar:[],asistencias:[],
  ajustes_temporales:[],actividades:[],portafolios:[],
  observaciones:[],notas_docente:[],configuraciones:[],cola_sincronizacion:[],registros_acceso:[],
};

function grupoDeTabla(t){for(const[g,ts]of Object.entries(GRUPOS))if(ts.includes(t))return g;return"Sistema";}

let selTab=null,filtroGrupo=null;

function kBadge(k){
  if(!k)return'';
  if(k==='PK')return'<span class="pk">PK</span>';
  if(k.includes('UK'))return'<span class="uk">UK</span>';
  if(k.startsWith('FK'))return'<span class="fk">FK</span>';
  return'';
}

function render(){
  const q=(document.getElementById('q').value||'').toLowerCase();
  const keys=Object.keys(TABLAS).filter(t=>{
    if(filtroGrupo&&!GRUPOS[filtroGrupo]?.includes(t))return false;
    if(!q)return true;
    if(t.includes(q))return true;
    return TABLAS[t].cols.some(c=>c.n.includes(q)||c.t.includes(q)||c.d.toLowerCase().includes(q));
  });
  const grid=document.getElementById('grid');
  if(!keys.length){grid.innerHTML='<div class="no-res">Sin resultados</div>';return;}
  grid.innerHTML=keys.map(t=>{
    const g=grupoDeTabla(t),col=COLOR[g]||'#888',bg=COLORBG[g]||'#f1efe8';
    const colsPreview=TABLAS[t].cols.filter(c=>c.n!=='UNIQUE').slice(0,4);
    const more=TABLAS[t].cols.filter(c=>c.n!=='UNIQUE').length-4;
    return`<div class="tcard${selTab===t?' sel':''}" onclick="selectTab('${t}')">
      <div class="tcard-head">
        <span class="tcard-name">${t}</span>
        <span class="badge" style="background:${bg};color:${col}">${g}</span>
      </div>
      <div class="tcard-desc">${TABLAS[t].desc.slice(0,60)}${TABLAS[t].desc.length>60?'…':''}</div>
      <div class="tcard-cols">
        ${colsPreview.map(c=>`<div class="col-row">
          <span class="col-name">${c.n}${kBadge(c.k)}</span>
          <span class="col-type">${c.t}</span>
        </div>`).join('')}
        ${more>0?`<div class="col-row" style="justify-content:center;color:var(--color-text-tertiary);font-size:11px">+${more} más</div>`:''}
      </div>
    </div>`;
  }).join('');
  renderDetail();
}

function selectTab(t){selTab=selTab===t?null:t;render();}

function renderDetail(){
  const el=document.getElementById('detail');
  if(!selTab){el.innerHTML='';return;}
  const tab=TABLAS[selTab];
  if(!tab){el.innerHTML='';return;}
  const g=grupoDeTabla(selTab),col=COLOR[g]||'#888',bg=COLORBG[g]||'#f1efe8';
  const rels=(RELS[selTab]||[]).filter(r=>TABLAS[r]);
  const enumCols=tab.cols.filter(c=>c.e);
  el.innerHTML=`<div class="detail-panel">
    <div class="detail-head">
      <div>
        <div class="detail-title">${selTab}</div>
        <div class="detail-desc">${tab.desc}</div>
      </div>
      <span class="badge" style="background:${bg};color:${col}">${g}</span>
    </div>
    <div class="detail-cols">
      <table>
        <colgroup><col class="col-w1"><col class="col-w2"><col class="col-w3"><col class="col-w4"></colgroup>
        <thead><tr><th>Columna</th><th>Tipo</th><th>Restricción</th><th>Descripción</th></tr></thead>
        <tbody>${tab.cols.map(c=>{
          const isUnique=c.n==='UNIQUE';
          const ref=c.k&&c.k.startsWith('FK')?c.k.replace('FK → ','').replace(' UK',''):'';
          const kshow=isUnique?'UNIQUE':c.k==='PK'?'PK':c.k.includes('UK')&&!c.k.startsWith('FK')?'UK':c.k.startsWith('FK')?'FK':'';
          const ks=kshow==='PK'?'color:#085041':kshow==='UK'?'color:#633806':kshow==='FK'?'color:#0C447C':kshow==='UNIQUE'?'color:#634':'color:var(--color-text-tertiary)';
          return`<tr>
            <td style="font-weight:${c.k==='PK'?'500':'400'};color:var(--color-text-primary);font-family:${isUnique?'inherit':'var(--font-mono)'}">${c.n}</td>
            <td style="font-family:var(--font-mono);color:var(--color-text-secondary)">${c.t}</td>
            <td><span style="${ks};font-size:11px">${kshow}</span>${ref?` <span style="cursor:pointer;color:#185FA5;font-size:11px" onclick="selectTab('${ref}')">${ref} ↗</span>`:''}</td>
            <td style="color:var(--color-text-secondary);font-size:12px">${c.d}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>
    ${enumCols.length?`<div class="enum-sec">
      <h4>Valores enum</h4>
      ${enumCols.map(c=>`<div style="margin-bottom:6px">
        <span style="font-size:11px;color:var(--color-text-secondary);margin-right:6px;font-family:var(--font-mono)">${c.n}:</span>
        <span class="enum-pills" style="display:inline-flex;gap:4px;flex-wrap:wrap">
          ${(ENUMS[c.e]||[]).map(v=>`<span class="enum-pill">${v}</span>`).join('')}
        </span>
      </div>`).join('')}
    </div>`:''}
    ${rels.length?`<div class="rel-sec">
      <h4>Tablas relacionadas</h4>
      <div class="rels">${rels.map(r=>`<span class="rel-pill" onclick="selectTab('${r}')">${r} →</span>`).join('')}</div>
    </div>`:''}
  </div>`;
}

function initChips(){
  document.getElementById('chips').innerHTML=Object.keys(GRUPOS).map(g=>`<span class="chip${filtroGrupo===g?' on':''}" onclick="toggleGrupo('${g}')">${g}</span>`).join('');
}
function toggleGrupo(g){filtroGrupo=filtroGrupo===g?null:g;initChips();render();}

function initStats(){
  const total=Object.keys(TABLAS).length;
  const totalCols=Object.values(TABLAS).reduce((a,t)=>a+t.cols.filter(c=>c.n!=='UNIQUE').length,0);
  const totalFks=Object.values(TABLAS).reduce((a,t)=>a+t.cols.filter(c=>c.k&&c.k.startsWith('FK')).length,0);
  const totalEnums=Object.values(TABLAS).reduce((a,t)=>a+t.cols.filter(c=>c.e).length,0);
  document.getElementById('stats').innerHTML=
    `<div class="stat"><span class="stat-n">${total}</span><span class="stat-l">tablas</span></div>
     <div class="stat"><span class="stat-n">${totalCols}</span><span class="stat-l">columnas</span></div>
     <div class="stat"><span class="stat-n">${totalFks}</span><span class="stat-l">FK</span></div>
     <div class="stat"><span class="stat-n">${totalEnums}</span><span class="stat-l">enums</span></div>`;
}

initStats();initChips();render();
</script>
